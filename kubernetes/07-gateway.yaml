apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: tickets
  labels:
    app: gateway

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gateway

  template:
    metadata:
      labels:
        app: gateway

    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gateway

      containers:
        - name: gateway
          image: tickets-gateway:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000

          env:
            - name: RESERVATIONS_URL
              value: "http://reservations-service:8000"

            - name: INVENTORY_URL
              value: "http://inventory-service:8000"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 300m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: tickets

spec:
  type: NodePort

  selector:
    app: gateway

  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080